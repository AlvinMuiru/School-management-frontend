<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3 border-secondary">
        <h2>🎓 Active Students</h2>
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addStudentModal">
            + Enroll Student
        </button>
    </div>
    
    <div class="row" id="student-list">
        <p class="text-muted">Loading students from Django API...</p>
    </div>
</div>

<div class="modal fade" id="addStudentModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content bg-dark border-secondary">
      <div class="modal-header border-secondary">
        <h5 class="modal-title">Enroll New Student</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="addStudentForm">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control bg-secondary text-white border-0" id="studentName" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Age</label>
                <input type="number" class="form-control bg-secondary text-white border-0" id="studentAge" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-2">Save to Database</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
   const API_URL = 'https://school-management-backend-ddk4.onrender.com/api/students/';
    // 1. Fetch and Draw Students (GET Request)
    function loadStudents() {
        fetch(API_URL)
            .then(response => response.json())
            .then(data => {
                const studentBox = document.getElementById('student-list');
                studentBox.innerHTML = ''; 

                data.forEach(student => {
                    const card = `
                        <div class="col-md-4 mb-3">
                            <div class="card h-100 bg-secondary text-white border-0 shadow-sm">
                                <div class="card-body">
                                    <h5 class="card-title fw-bold">${student.name}</h5>
                                    <p class="card-text mb-2">Age: ${student.age}</p>
                                    <span class="badge bg-info text-dark">Database ID: #${student.id}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    studentBox.innerHTML += card;
                });
            });
    }

    // 2. Add New Student (POST Request)
    document.getElementById('addStudentForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Stop the page from reloading
        
        // Grab values from the form inputs
        const newStudent = {
            name: document.getElementById('studentName').value,
            age: document.getElementById('studentAge').value,
            subjects: [1] 
        };

        // Send data to Django API
        fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(newStudent)
        })
        .then(response => {
            if(response.ok) {
                // Hide popup, clear form, and reload the updated student list
                bootstrap.Modal.getInstance(document.getElementById('addStudentModal')).hide();
                document.getElementById('addStudentForm').reset();
                loadStudents();
            } else {
                alert("Failed to save student.");
            }
        });
    });

    // Run when page loads
    loadStudents();
</script>

</body>
</html>
